name: Trigger Vault Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DSA-Vault Workflow
        run: |
          curl -H "Authorization: token ${{ secrets.VAULT_DEPLOY_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               -X POST \
               https://api.github.com/repos/yathartharastogi/DSA-Vault/dispatches \
               -d '{"event_type":"trigger_build"}'
