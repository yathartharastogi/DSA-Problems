name: Update README Count

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update count
        run: |
          LEETCODE_COUNT=$(find LeetCode -type f -name "*.cpp" | wc -l)
          CodeForces_COUNT=$(find CodeForces -type f -name "*.cpp" | wc -l)
          TOTAL_COUNT=$((LEETCODE_COUNT + CodeForces_COUNT))

          sed -i "s/| LeetCode | .* |/| LeetCode | $LEETCODE_COUNT |/" README.md
          sed -i "s/| CodeForces | .* |/| CodeForces | $CodeForces_COUNT |/" README.md
          sed -i "s/| \*\*Total\*\* | .* |/| **Total** | **$TOTAL_COUNT** |/" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md

          if ! git diff --cached --quiet; then
            git commit -m "Update solution count"
            git push
          fi