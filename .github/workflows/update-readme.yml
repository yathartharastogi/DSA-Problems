```yaml
name: Update README Count

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update count
        run: |
          LEETCODE_COUNT=$(find LeetCode -type f -name "*.cpp" | wc -l)
          CODEFORCES_COUNT=$(find CodeForces -type f -name "*.cpp" | wc -l)
          TOTAL_COUNT=$((LEETCODE_COUNT + CODEFORCES_COUNT))

          awk -v lc="$LEETCODE_COUNT" -v cf="$CODEFORCES_COUNT" -v total="$TOTAL_COUNT" '
          /\| LeetCode/   {print "| LeetCode   | " lc " |"; next}
          /\| CodeForces/ {print "| CodeForces | " cf " |"; next}
          /\| \*\*Total\*\*/ {print "| **Total** | **" total "** |"; next}
          {print}
          ' README.md > README.tmp

          mv README.tmp README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md

          if ! git diff --cached --quiet; then
            git commit -m "Update solution count"
            git push
          fi
```
